# parallel_budget Fava Dashboard
# 将此文件合并到你 Fava 实例的 data/dashboards.yaml 中
#
# 依赖:
#   1. parallel_budget plugin 已在 main.beancount 中启用
#   2. budget 已在 budget.beancount 或主账本中定义
#
# 若 Fava 版本不支持 jinja2 面板，可使用 type: html + script 替代

dashboards:
  - name: "📊 预算看板"
    panels:
      # 面板 1: 预算余额总览
      - title: "💰 预算余额"
        width: full
        queries:
        - bql: |
            SELECT account, sum(position) as balance
            WHERE account ~ 'Equity:Budget:Balance:'
              AND account != 'Equity:Budget:Income:'
            GROUP BY account
            ORDER BY account
        type: jinja2
        template: |
          {% import "_query_table.html" as querytable %}
          {{ querytable.querytable(favaledger, None, panel.queries[0].result_types, panel.queries[0].result) }}

      # 面板 2: 预算内实际支出
      - title: "📉 实际支出"
        width: half
        queries:
        - bql: |
            SELECT account, sum(position) as expense
            WHERE account ~ 'Equity:Budget:Expenses:'
            GROUP BY account
            ORDER BY account
        type: jinja2
        template: |
          {% import "_query_table.html" as querytable %}
          {{ querytable.querytable(favaledger, None, panel.queries[0].result_types, panel.queries[0].result) }}

      # 面板 3: 全部预算明细
      - title: "📋 预算明细"
        width: half
        queries:
        - bql: |
            SELECT account, sum(position) as total
            WHERE account ~ 'Equity:Budget:'
            GROUP BY account
            ORDER BY account
        type: jinja2
        template: |
          {% import "_query_table.html" as querytable %}
          {{ querytable.querytable(favaledger, None, panel.queries[0].result_types, panel.queries[0].result) }}